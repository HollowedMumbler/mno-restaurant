<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MNO – Waiter Station</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { font-family: 'DM Sans', sans-serif; }
  .mono { font-family: 'DM Mono', monospace; }
  .fade-in { animation: fadeIn 0.2s ease; }
  .notif-dot { position:absolute; top:-4px; right:-4px; width:10px; height:10px; background:#EF4444; border-radius:50%; border:2px solid #F9FAFB; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Bar -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <span class="text-lg font-600 tracking-tight text-gray-900">MNO</span>
      <span class="text-lg font-300 text-gray-400 ml-1">Restaurant</span>
      <span class="ml-3 text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-500">Waiter</span>
    </div>
    <div class="flex items-center gap-4">
      <nav class="flex gap-3 text-sm text-gray-400">
        <a href="cashier.html" class="hover:text-gray-700 transition-colors">Cashier</a>
        <a href="kitchen.html" class="hover:text-gray-700 transition-colors">Kitchen</a>
        <a href="manager.html" class="hover:text-gray-700 transition-colors">Manager</a>
      </nav>
      <div class="text-sm text-gray-400 mono" id="clock"></div>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-600 text-gray-900">Waiter Station</h1>
      <p class="text-sm text-gray-400 mt-0.5">Take orders and monitor food ready for pickup.</p>
    </div>
    <div class="flex items-center gap-1 bg-gray-100 rounded-xl p-1">

      <button onclick="setWaiterTab('order')" id="wtab-order"
        class="px-4 py-1.5 rounded-lg text-sm font-500 transition-all bg-gray-900 text-white">
        Take Order
      </button>
      <button onclick="setWaiterTab('pickup')" id="wtab-pickup"
        class="relative px-4 py-1.5 rounded-lg text-sm font-500 transition-all text-gray-500 hover:text-gray-700">
        Ready for Pickup
        <span id="waiter-notif-dot" class="notif-dot hidden"></span>
      </button>
    </div>
  </div>

  <!-- Take Order Panel -->
  <div id="waiter-panel-order">
    <div class="flex justify-end mb-4">
      <div class="flex items-center gap-3">
        <label class="text-sm text-gray-500">Table</label>
        <select id="waiter-table" class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-gray-200">
          <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-5">
      <!-- Menu -->
      <div class="col-span-2">
        <div class="flex gap-2 mb-4 flex-wrap" id="cat-tabs"></div>
        <div class="grid grid-cols-2 gap-3" id="menu-grid"></div>
      </div>

      <!-- Cart -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <p class="text-xs uppercase tracking-widest text-gray-400 font-500">Current Order</p>
          <button onclick="toggleCustomize()" id="customize-btn"
            class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:border-gray-400 hover:text-gray-800 transition-all">
            ✏️ Customize
          </button>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 p-4 flex flex-col" style="min-height:360px">
          <div id="cart-items" class="flex-1 space-y-2"></div>
          <div id="cart-empty" class="flex-1 flex items-center justify-center text-sm text-gray-300">No items yet</div>
          <div class="border-t border-gray-100 mt-4 pt-4 space-y-1">
            <div class="flex justify-between text-sm text-gray-500">
              <span>Subtotal</span><span class="mono" id="cart-sub">₱0.00</span>
            </div>
            <div class="flex justify-between text-sm text-gray-500">
              <span>Tax (12%)</span><span class="mono" id="cart-tax">₱0.00</span>
            </div>
            <div class="flex justify-between text-base font-600 text-gray-900 mt-1">
              <span>Total</span><span class="mono" id="cart-total">₱0.00</span>
            </div>
          </div>
          <button onclick="submitOrder()" class="mt-4 w-full bg-gray-900 text-white rounded-xl py-2.5 text-sm font-500 hover:bg-gray-700 transition-colors">
            Submit Order →
          </button>
        </div>
      </div>
    </div>

    <!-- Returned Orders Alert -->
    <div id="waiter-alerts" class="mt-6 space-y-3"></div>
  </div>

  <!-- Ready for Pickup Panel -->
  <div id="waiter-panel-pickup" class="hidden">
    <div class="flex items-center gap-2 mb-4">
      <p class="text-xs uppercase tracking-widest text-gray-400 font-500">Ready for Pickup</p>
      <span id="ready-count-badge" class="hidden bg-green-500 text-white text-xs font-600 px-2 py-0.5 rounded-full"></span>
    </div>
    <div id="waiter-ready-orders" class="grid grid-cols-2 gap-4"></div>
    <div id="waiter-ready-empty" class="bg-white border border-dashed border-gray-200 rounded-2xl py-16 text-center text-sm text-gray-300">No orders ready yet</div>
  </div>
</main>

<!-- Toast -->
<div id="waiter-toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-xl shadow-lg z-50"></div>

<!-- Remark Modal -->
<div id="remark-modal" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl p-6 w-80 shadow-xl">
    <p class="font-600 text-gray-900 mb-1" id="remark-item-name"></p>
    <p class="text-xs text-gray-400 mb-3">Add a special instruction for this item</p>
    <textarea id="remark-input" rows="3" placeholder="e.g. No mushroom, extra sauce, well done..."
      class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-200 resize-none"></textarea>
    <div class="flex gap-2 mt-3">
      <button onclick="closeRemarkModal()" class="flex-1 border border-gray-200 rounded-xl py-2 text-sm text-gray-500 hover:bg-gray-50">Cancel</button>
      <button onclick="saveRemark()" class="flex-1 bg-gray-900 text-white rounded-xl py-2 text-sm hover:bg-gray-700">Save</button>
    </div>
  </div>
</div>

<script>
// ── SHARED DATA ───────────────────────────────────────────────
const MENU = [
  { id:1,  name:'Calamari Rings',      price:145, cat:'Appetizers' },
  { id:2,  name:'Chicken Wings',        price:165, cat:'Appetizers' },
  { id:3,  name:'Cheese Sticks',        price:95,  cat:'Appetizers' },
  { id:4,  name:'Nachos with Salsa',    price:120, cat:'Appetizers' },
  { id:5,  name:'Soup of the Day',      price:85,  cat:'Appetizers' },
  { id:6,  name:'Grilled Chicken',      price:220, cat:'Mains' },
  { id:7,  name:'Pork Sinigang',        price:195, cat:'Mains' },
  { id:8,  name:'Beef Steak',           price:295, cat:'Mains' },
  { id:9,  name:'Pork BBQ Ribs',        price:320, cat:'Mains' },
  { id:10, name:'Seafood Pasta',        price:260, cat:'Mains' },
  { id:11, name:'Fish & Chips',         price:210, cat:'Mains' },
  { id:12, name:'Vegetable Stir Fry',   price:175, cat:'Mains' },
  { id:13, name:'Garlic Rice',          price:60,  cat:'Sides' },
  { id:14, name:'Steamed Rice',         price:40,  cat:'Sides' },
  { id:15, name:'Mixed Vegetables',     price:80,  cat:'Sides' },
  { id:16, name:'French Fries',         price:75,  cat:'Sides' },
  { id:17, name:'Coleslaw',            price:55,  cat:'Sides' },
  { id:18, name:'Halo-Halo',           price:120, cat:'Desserts' },
  { id:19, name:'Chocolate Lava Cake', price:135, cat:'Desserts' },
  { id:20, name:'Leche Flan',          price:95,  cat:'Desserts' },
  { id:21, name:'Mango Panna Cotta',   price:110, cat:'Desserts' },
  { id:22, name:'Iced Tea',            price:55,  cat:'Drinks' },
  { id:23, name:'Coke Float',          price:75,  cat:'Drinks' },
  { id:24, name:'Fresh Buko Juice',    price:70,  cat:'Drinks' },
  { id:25, name:'Bottled Water',       price:35,  cat:'Drinks' },
  { id:26, name:'Hot Coffee',          price:80,  cat:'Drinks' },
  { id:27, name:'Fruit Shake',         price:95,  cat:'Drinks' },
];

let cart = [];
let orders = JSON.parse(localStorage.getItem('mno_orders') || '[]');
let orderCounter = parseInt(localStorage.getItem('mno_counter') || '1000');

function save() {
  localStorage.setItem('mno_orders', JSON.stringify(orders));
  localStorage.setItem('mno_counter', orderCounter);
}

// Load any custom menu items saved by manager
const savedCustom = JSON.parse(localStorage.getItem('mno_menu_extra') || '[]');
savedCustom.forEach(item => { if (!MENU.find(m => m.id === item.id)) MENU.push(item); });

// ── CLOCK ─────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── WAITER TAB SWITCHER ───────────────────────────────────────
function setWaiterTab(tab) {
  const isOrder = tab === 'order';
  document.getElementById('waiter-panel-order').classList.toggle('hidden', !isOrder);
  document.getElementById('waiter-panel-pickup').classList.toggle('hidden', isOrder);
  document.getElementById('wtab-order').className = `px-4 py-1.5 rounded-lg text-sm font-500 transition-all ${isOrder ? 'bg-gray-900 text-white' : 'text-gray-500 hover:text-gray-700'}`;
  document.getElementById('wtab-pickup').className = `relative px-4 py-1.5 rounded-lg text-sm font-500 transition-all ${!isOrder ? 'bg-gray-900 text-white' : 'text-gray-500 hover:text-gray-700'}`;
  const dot = document.getElementById('waiter-notif-dot');
  if (dot) document.getElementById('wtab-pickup').appendChild(dot);
}

// ── MENU ──────────────────────────────────────────────────────
const CATS = ['Appetizers','Mains','Sides','Desserts','Drinks'];
let activecat = 'Appetizers';
let customizeMode = false;
let remarkTargetId = null;

function renderCatTabs() {
  document.getElementById('cat-tabs').innerHTML = CATS.map(c => `
    <button onclick="setcat('${c}')" id="tab-${c}"
      class="px-4 py-1.5 rounded-lg text-sm font-500 transition-all border
      ${c === activecat ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-400'}">
      ${c}
    </button>
  `).join('');
}

function setcat(cat) {
  activecat = cat;
  renderCatTabs();
  renderMenu();
}

function renderMenu() {
  const items = MENU.filter(m => m.cat === activecat);
  document.getElementById('menu-grid').innerHTML = items.map(item => `
    <button onclick="addToCart(${item.id})"
      class="bg-white border border-gray-100 rounded-2xl p-4 text-left hover:border-gray-300 hover:shadow-sm transition-all">
      <p class="font-500 text-gray-800 text-sm leading-tight">${item.name}</p>
      <p class="mono text-gray-900 font-600 text-base mt-2">₱${item.price}</p>
    </button>
  `).join('');
}

function addToCart(id) {
  const item = MENU.find(m => m.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) existing.qty++;
  else cart.push({ ...item, qty: 1, remark: '' });
  renderCart();
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  renderCart();
}

function toggleCustomize() {
  customizeMode = !customizeMode;
  const btn = document.getElementById('customize-btn');
  btn.textContent = customizeMode ? '✓ Done' : '✏️ Customize';
  btn.className = customizeMode
    ? 'text-xs px-3 py-1.5 rounded-lg border border-gray-900 bg-gray-900 text-white transition-all'
    : 'text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:border-gray-400 hover:text-gray-800 transition-all';
  renderCart();
}

function openRemarkModal(cartId) {
  remarkTargetId = cartId;
  const item = cart.find(c => c.id === cartId);
  document.getElementById('remark-item-name').textContent = item.name;
  document.getElementById('remark-input').value = item.remark || '';
  document.getElementById('remark-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('remark-input').focus(), 50);
}

function closeRemarkModal() {
  document.getElementById('remark-modal').classList.add('hidden');
  remarkTargetId = null;
}

function saveRemark() {
  const item = cart.find(c => c.id === remarkTargetId);
  if (item) item.remark = document.getElementById('remark-input').value.trim();
  closeRemarkModal();
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const empty = document.getElementById('cart-empty');
  if (cart.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'flex';
  } else {
    empty.style.display = 'none';
    container.innerHTML = cart.map(c => `
      <div class="text-sm ${customizeMode ? 'bg-gray-50 rounded-xl p-2' : ''}">
        <div class="flex items-center justify-between">
          <span class="text-gray-700 flex-1">${c.name} <span class="text-gray-400">×${c.qty}</span></span>
          <span class="mono text-gray-600 mr-2">₱${c.price * c.qty}</span>
          ${customizeMode
            ? `<button onclick="openRemarkModal(${c.id})" class="text-xs px-2 py-0.5 rounded-md border border-gray-300 text-gray-600 hover:bg-white transition-all">customize</button>`
            : `<button onclick="removeFromCart(${c.id})" class="text-gray-300 hover:text-red-400 text-xs">✕</button>`
          }
        </div>
        ${c.remark ? `<p class="text-xs text-amber-600 mt-1 pl-0.5">📝 ${c.remark}</p>` : ''}
      </div>
    `).join('');
  }
  const sub   = cart.reduce((a, c) => a + c.price * c.qty, 0);
  const tax   = sub * 0.12;
  const total = sub + tax;
  document.getElementById('cart-sub').textContent   = '₱' + sub.toFixed(2);
  document.getElementById('cart-tax').textContent   = '₱' + tax.toFixed(2);
  document.getElementById('cart-total').textContent = '₱' + total.toFixed(2);
}

function submitOrder() {
  if (cart.length === 0) { showToast('Add items first.'); return; }
  const table = document.getElementById('waiter-table').value;
  orderCounter++;
  const sub   = cart.reduce((a, c) => a + c.price * c.qty, 0);
  const tax   = sub * 0.12;
  const order = {
    id: orderCounter,
    table,
    items: cart.map(c => ({ ...c })),
    sub: sub.toFixed(2),
    tax: tax.toFixed(2),
    total: (sub + tax).toFixed(2),
    status: 'pending',
    time: new Date().toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' }),
    date: new Date().toLocaleDateString('en-PH'),
  };
  orders.push(order);
  save();
  cart = [];
  customizeMode = false;
  document.getElementById('customize-btn').textContent = '✏️ Customize';
  document.getElementById('customize-btn').className = 'text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:border-gray-400 hover:text-gray-800 transition-all';
  renderCart();
  showToast('Order #' + orderCounter + ' submitted!');
}

function showToast(msg) {
  const t = document.getElementById('waiter-toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2500);
}

// ── WAITER ALERTS & READY SECTION ────────────────────────────
function renderWaiterAlerts() {
  orders = JSON.parse(localStorage.getItem('mno_orders') || '[]');

  // Returned / unavailable alerts
  const returned = orders.filter(o => o.status === 'notify_waiter');
  const alertContainer = document.getElementById('waiter-alerts');
  if (alertContainer) {
    if (returned.length === 0) {
      alertContainer.innerHTML = '';
    } else {
      alertContainer.innerHTML = returned.map(o => `
        <div class="bg-red-50 border border-red-200 rounded-2xl p-4 fade-in">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-red-400 rounded-full animate-pulse"></span>
              <span class="text-sm font-600 text-red-700">Item(s) unavailable — Table ${o.table} · Order #${o.id}</span>
            </div>
            <button onclick="acknowledgeReturn(${o.id})" class="text-xs text-red-400 hover:text-red-600 border border-red-200 rounded-lg px-2 py-1">Acknowledge</button>
          </div>
          <div class="space-y-1">
            ${o.items.map(i => `
              <div class="flex items-center gap-2 text-sm">
                <span class="${i.unavailable ? 'line-through text-gray-300' : 'text-gray-600'}">${i.name} ×${i.qty}</span>
                ${i.unavailable ? '<span class="text-xs text-red-400 font-500">Unavailable</span>' : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }
  }

  // Ready for Pickup
  const ready = orders.filter(o => o.status === 'ready');
  const readyContainer = document.getElementById('waiter-ready-orders');
  const readyEmpty = document.getElementById('waiter-ready-empty');
  const readyBadge = document.getElementById('ready-count-badge');
  const notifDot = document.getElementById('waiter-notif-dot');

  if (ready.length === 0) {
    if (readyContainer) readyContainer.innerHTML = '';
    if (readyEmpty) readyEmpty.classList.remove('hidden');
    if (readyBadge) readyBadge.classList.add('hidden');
    if (notifDot) notifDot.classList.add('hidden');
  } else {
    if (readyEmpty) readyEmpty.classList.add('hidden');
    if (readyBadge) { readyBadge.textContent = ready.length; readyBadge.classList.remove('hidden'); }
    if (notifDot) notifDot.classList.remove('hidden');
    if (readyContainer) {
      readyContainer.innerHTML = ready.map(o => `
        <div class="bg-white border-2 border-green-200 rounded-2xl p-5 fade-in">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
              <span class="mono text-lg font-600 text-gray-900">#${o.id}</span>
            </div>
            <span class="text-sm text-gray-400">Table ${o.table} · ${o.time}</span>
          </div>
          <div class="space-y-1.5 mb-4">
            ${o.items.map(i => `
              <div class="flex items-center gap-2">
                <span class="w-5 h-5 bg-green-50 text-green-600 rounded-full text-xs flex items-center justify-center font-600 shrink-0">${i.qty}</span>
                <span class="${i.unavailable ? 'line-through text-gray-300' : 'text-gray-700'} text-sm">${i.name}</span>
                ${i.unavailable ? '<span class="text-xs text-red-400">Unavailable</span>' : ''}
              </div>
            `).join('')}
          </div>
          <button onclick="confirmPickup(${o.id})" class="w-full bg-green-600 text-white rounded-xl py-2 text-sm hover:bg-green-700 transition-colors font-500">
            ✓ Confirm Pickup
          </button>
        </div>
      `).join('');
    }
  }
}

function confirmPickup(id) {
  orders = JSON.parse(localStorage.getItem('mno_orders') || '[]');
  const o = orders.find(o => o.id === id);
  if (o) { o.status = 'delivered'; save(); }
  event.target.closest('.bg-white.border-2').remove();
  const remaining = document.querySelectorAll('#waiter-ready-orders .bg-white.border-2');
  if (remaining.length === 0) {
    document.getElementById('waiter-ready-empty').classList.remove('hidden');
    document.getElementById('ready-count-badge').classList.add('hidden');
    document.getElementById('waiter-notif-dot').classList.add('hidden');
  }
}
function acknowledgeReturn(id) {
}



// ── POLL ──────────────────────────────────────────────────────
let lastSnapshot = localStorage.getItem('mno_orders') || '[]';
setInterval(() => {
  const current = localStorage.getItem('mno_orders') || '[]';
  if (current !== lastSnapshot) {
    lastSnapshot = current;
    renderWaiterAlerts();
  }
}, 5000);

// ── INIT ──────────────────────────────────────────────────────
renderCatTabs();
renderMenu();
renderCart();
renderWaiterAlerts();
</script>
</body>
</html>
