<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MNO – Kitchen Display</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { font-family: 'DM Sans', sans-serif; }
  .mono { font-family: 'DM Mono', monospace; }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Top Bar -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <span class="text-lg font-600 tracking-tight text-gray-900">MNO</span>
      <span class="text-lg font-300 text-gray-400 ml-1">Restaurant</span>
      <span class="ml-3 text-xs bg-gray-100 text-gray-500 px-3 py-1 rounded-full font-500">Kitchen</span>
    </div>
    <div class="flex items-center gap-4">
      <nav class="flex gap-3 text-sm text-gray-400">
        <a href="index.html" class="hover:text-gray-700 transition-colors">Waiter</a>
        <a href="cashier.html" class="hover:text-gray-700 transition-colors">Cashier</a>
        <a href="manager.html" class="hover:text-gray-700 transition-colors">Manager</a>
      </nav>
      <div class="text-sm text-gray-400 mono" id="clock"></div>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-8">
  <div class="mb-6">
    <h1 class="text-2xl font-600 text-gray-900">Kitchen Display</h1>
    <p class="text-sm text-gray-400 mt-0.5">Orders confirmed by cashier appear here. Mark items unavailable or mark ready when done.</p>
  </div>
  <div id="kitchen-orders" class="grid grid-cols-2 gap-4"></div>
  <div id="kitchen-empty" class="text-center py-20 text-gray-300 text-sm">No orders in queue</div>
</main>

<!-- Unavailable Modal -->
<div id="unavail-modal" class="hidden fixed inset-0 bg-black/30 z-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl p-6 shadow-xl" style="width:22rem">
    <div class="flex items-center justify-between mb-1">
      <p class="font-600 text-gray-900">Mark Unavailable Items</p>
      <span class="mono text-sm text-gray-400" id="unavail-order-id"></span>
    </div>
    <p class="text-xs text-gray-400 mb-4">Tick items you cannot prepare. Order will be sent back to cashier.</p>
    <div id="unavail-item-list" class="space-y-2 mb-5"></div>
    <div class="flex gap-2">
      <button onclick="closeUnavailModal()" class="flex-1 border border-gray-200 rounded-xl py-2 text-sm text-gray-500 hover:bg-gray-50">Cancel</button>
      <button onclick="submitUnavailable()" class="flex-1 bg-red-500 text-white rounded-xl py-2 text-sm hover:bg-red-600 transition-colors">Send Back to Cashier</button>
    </div>
  </div>
</div>

<script>
// ── SHARED DATA ───────────────────────────────────────────────
let orders = JSON.parse(localStorage.getItem('mno_orders') || '[]');

function save() {
  localStorage.setItem('mno_orders', JSON.stringify(orders));
}

// ── CLOCK ─────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-PH', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── KITCHEN RENDER ────────────────────────────────────────────
function renderKitchen() {
  orders = JSON.parse(localStorage.getItem('mno_orders') || '[]');
  const queue = orders.filter(o => o.status === 'confirmed' || o.status === 'ready');
  const container = document.getElementById('kitchen-orders');
  const empty = document.getElementById('kitchen-empty');

  if (queue.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = queue.map(o => `
    <div class="bg-white border-2 ${o.status === 'ready' ? 'border-green-200' : 'border-gray-100'} rounded-2xl p-5 fade-in">
      <div class="flex items-center justify-between mb-3">
        <span class="mono text-xl font-600 text-gray-900">#${o.id}</span>
        <span class="text-sm text-gray-400">Table ${o.table} · ${o.time}</span>
      </div>
      <div class="space-y-2 mb-4">
        ${o.items.map(i => `
          <div class="flex items-start gap-2">
            <span class="w-6 h-6 ${i.unavailable ? 'bg-red-100 text-red-400' : 'bg-gray-100 text-gray-600'} rounded-full text-xs flex items-center justify-center font-600 shrink-0 mt-0.5">${i.qty}</span>
            <div>
              <span class="${i.unavailable ? 'line-through text-gray-300' : 'text-gray-800'} text-sm">${i.name}</span>
              ${i.unavailable ? '<span class="text-xs text-red-400 ml-1 font-500">Unavailable</span>' : ''}
              ${i.remark && !i.unavailable ? `<p class="text-xs text-amber-600 mt-0.5">📝 ${i.remark}</p>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      ${o.status === 'confirmed' ? `
        <div class="flex gap-2">
          <button onclick="openUnavailModal(${o.id})" class="flex-1 border border-red-200 text-red-500 rounded-xl py-2 text-sm hover:bg-red-50 transition-colors">Item Unavailable</button>
          <button onclick="markReady(${o.id})" class="flex-1 bg-gray-900 text-white rounded-xl py-2 text-sm hover:bg-gray-700 transition-colors">Mark Ready</button>
        </div>` :
        `<div class="w-full bg-green-50 text-green-700 rounded-xl py-2 text-sm text-center font-500">✓ Ready for pickup</div>`
      }
    </div>
  `).join('');
}

function markReady(id) {
  const o = orders.find(o => o.id === id);
  if (o) { o.status = 'ready'; save(); renderKitchen(); }
}

let unavailOrderId = null;

function openUnavailModal(id) {
  unavailOrderId = id;
  const o = orders.find(o => o.id === id);
  document.getElementById('unavail-order-id').textContent = '#' + o.id;
  document.getElementById('unavail-item-list').innerHTML = o.items.map((item, idx) => `
    <label class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-50 cursor-pointer">
      <input type="checkbox" data-idx="${idx}" ${item.unavailable ? 'checked' : ''}
        class="w-4 h-4 accent-red-500 rounded" />
      <span class="${item.unavailable ? 'line-through text-gray-300' : 'text-gray-700'} text-sm flex-1">${item.name}</span>
      <span class="mono text-xs text-gray-400">×${item.qty}</span>
    </label>
  `).join('');
  document.getElementById('unavail-modal').classList.remove('hidden');
}

function closeUnavailModal() {
  document.getElementById('unavail-modal').classList.add('hidden');
  unavailOrderId = null;
}

function submitUnavailable() {
  const o = orders.find(o => o.id === unavailOrderId);
  if (!o) return;
  const checkboxes = document.querySelectorAll('#unavail-item-list input[type=checkbox]');
  let anyChecked = false;
  checkboxes.forEach(cb => {
    o.items[parseInt(cb.dataset.idx)].unavailable = cb.checked;
    if (cb.checked) anyChecked = true;
  });
  if (!anyChecked) { closeUnavailModal(); return; }
  o.status = 'returned';
  save();
  closeUnavailModal();
  renderKitchen();
}

// ── POLL ──────────────────────────────────────────────────────
let lastSnapshot = localStorage.getItem('mno_orders') || '[]';
setInterval(() => {
  const current = localStorage.getItem('mno_orders') || '[]';
  if (current !== lastSnapshot) {
    lastSnapshot = current;
    renderKitchen();
  }
}, 5000);

// ── INIT ──────────────────────────────────────────────────────
renderKitchen();
</script>
</body>
</html>
